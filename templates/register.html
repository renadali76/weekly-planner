{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}
<h1>Register</h1>
<p>Create your account here.</p>

<form method="POST">
    <label>Username</label>
    <input type = "text" name = "username" required>

    <label>Email</label>
    <input type = "email" name = "email" required>

    <label>Password</label>
    <input type = "password" name = "password" required>

    <button type = "submit">
        Register
    </button>
</form>

{% endblock %}
