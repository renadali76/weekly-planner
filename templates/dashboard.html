{% extends "base.html" %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}
<h1>Welcome {{ username }} !</h1>

<a href="{{ url_for('add_task_route') }}">Add New Task</a>

<hr>

{% for task in tasks %}

<h3>{{ task["title"] }}</h3>
<p>Due: {{ task["due_date"] }}</p>
<p>Priority: {{ task["priority"] }}</p>
<hr>
{% else %}

<p>No task yet.</p>
{% endfor %}
{% endblock %}
